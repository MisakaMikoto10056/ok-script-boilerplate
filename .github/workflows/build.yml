name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 仅在推送版本标签时触发
  workflow_dispatch:  # 添加手动触发选项

jobs:
  build:
    runs-on: windows-latest
    
    env:
      PYTHONIOENCODING: 'UTF-8'

    strategy:
      matrix:
        python-version: [3.12]

    steps:
      # 1. 配置 Git 环境
      - name: Configure Git Environment
        run: |
          # 设置控制台编码为 UTF-8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          
          # 配置 Git 避免换行符问题
          git config --global core.autocrlf false
          git config --global core.eol lf
          
          # 设置提交者信息（显示为 GitHub Actions）
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 优化 Git 网络设置（提高大文件传输稳定性）
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

      # 2. 检出代码
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true  # 启用 Git 大文件支持
          fetch-depth: 0  # 获取完整历史（用于生成更新日志）

      # 3. 设置 Python 环境
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'  # 缓存 pip 包，加快后续构建

      # 4. 设置编码环境变量
      - name: Configure Encoding
        run: |
          # 设置 Python 和 Windows 控制台编码
          set PYTHONIOENCODING=utf-8
          set PYTHONLEGACYWINDOWSSTDIO=utf-8
          
          # 持久化环境变量到后续步骤
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          echo "PYTHONLEGACYWINDOWSSTDIO=utf-8" >> $env:GITHUB_ENV

      # 5. 安装依赖
      - name: Install Dependencies
        run: |
          # 升级 pip 到最新版
          python -m pip install --upgrade pip
          
          # 安装项目依赖
          pip install -r requirements.txt

      # 6. 可选：运行测试
      - name: Run Tests (Optional)
        if: false  # 默认禁用，可改为 true 启用
        run: |
          echo "运行测试..."
          # 如果有测试目录，可以取消注释下面的代码
          # python -m pytest tests/ -v

      # 7. 内联依赖到源码（可选）
      - name: Inline Dependencies (Optional)
        if: false  # 默认禁用
        run: |
          echo "将外部依赖打包到源码中..."
          # 如果有 inline_ok_requirements 功能，可启用
          # python -m ok.update.inline_ok_requirements --tag ${{ github.ref_name }}

      # 8. 生成更新日志（本地）
      - name: Generate Changelog
        id: changelog
        run: |
          echo "生成更新日志..."
          
          # 获取当前标签
          CURRENT_TAG="${{ github.ref_name }}"
          echo "当前标签: $CURRENT_TAG"
          
          # 获取上一个标签（如果有）
          if git describe --tags --abbrev=0 "$CURRENT_TAG"^ 2>/dev/null; then
            PREV_TAG=$(git describe --tags --abbrev=0 "$CURRENT_TAG"^)
          else
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)  # 第一个提交
          fi
          
          echo "上一个标签: $PREV_TAG"
          
          # 生成更新日志
          if [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            CHANGES=$(git log --pretty=format:"• %s (%h)" "$PREV_TAG".."$CURRENT_TAG")
          else
            CHANGES="• 首次发布"
          fi
          
          echo "更新日志:"
          echo "$CHANGES"
          
          # 保存到环境变量供后续步骤使用
          echo "changes<<EOF" >> $env:GITHUB_OUTPUT
          echo "$CHANGES" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT
          
          echo "prev_tag=$PREV_TAG" >> $env:GITHUB_OUTPUT
          echo "current_tag=$CURRENT_TAG" >> $env:GITHUB_OUTPUT
        shell: bash

      # 9. 打包为 EXE
      - name: Build Executable
        run: |
          echo "开始打包 EXE..."
          
          # 安装 PyInstaller（如果需要）
          pip install pyinstaller
          
          # 简单的打包命令示例
          # 实际需要根据项目结构调整
          pyinstaller --onefile --name "MyApp" main.py
          
          # 或者使用项目自带的构建脚本
          # python setup.py build
          
          echo "打包完成"

      # 10. 创建发布版本
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: "版本 ${{ github.ref_name }}"
          generate_release_notes: true  # GitHub 自动生成
          draft: false
          prerelease: false
          files: |
            dist/*.exe

      # 11. 上传构建产物（备用，如果 Release 步骤失败）
      - name: Upload Artifacts (Backup)
        if: always()  # 无论前面步骤成功与否都执行
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build/
          retention-days: 7  # 保留7天
